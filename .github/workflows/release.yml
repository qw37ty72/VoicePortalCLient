# Сборка и публикация релиза при пуше тега v*
# Как посмотреть ошибку: Actions → нужный run → job "release" → раскрыть шаг "Build and publish" (там полный лог).
name: Build and release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          npm version "$VERSION" --no-git-tag-version -w client

      - name: Build and publish
        run: cd client && npm run release:publish
