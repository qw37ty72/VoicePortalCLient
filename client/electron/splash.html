<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
    }
    .splash-content { -webkit-app-region: no-drag; text-align: center; padding: 24px; }
    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00f5ff 0%, #ff00aa 100%);
      box-shadow: 0 0 24px rgba(0, 245, 255, 0.5);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 24px rgba(0, 245, 255, 0.5); }
      50% { opacity: 0.9; transform: scale(1.02); box-shadow: 0 0 32px rgba(0, 245, 255, 0.6); }
    }
    .title {
      font-size: 18px;
      font-weight: 600;
      color: #00f5ff;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .message {
      font-size: 13px;
      color: #9090a0;
      margin-bottom: 20px;
      min-height: 20px;
    }
    .countdown-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .countdown-num {
      font-size: 28px;
      font-weight: 700;
      color: #00f5ff;
      text-shadow: 0 0 12px rgba(0, 245, 255, 0.6);
      transition: transform 0.2s ease;
    }
    .countdown-num.pop { animation: pop 0.3s ease; }
    @keyframes pop {
      0% { transform: scale(1.2); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
    .progress-wrap {
      width: 260px;
      margin: 0 auto 8px;
      height: 6px;
      background: #12121a;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00f5ff, #ff00aa);
      border-radius: 3px;
      transition: width 0.25s ease-out;
    }
    .progress-pct {
      font-size: 12px;
      color: #00f5ff;
      margin-top: 4px;
    }
    .state-downloading .countdown-wrap,
    .state-installing .countdown-wrap { display: none; }
    .state-checking .progress-wrap,
    .state-checking .progress-pct { display: none; }
    .state-downloading .progress-wrap,
    .state-downloading .progress-pct,
    .state-installing .progress-wrap,
    .state-installing .progress-pct { display: block; }
  </style>
</head>
<body>
  <div class="splash-content state-checking" id="root">
    <div class="logo"></div>
    <div class="title">Voice Portal</div>
    <div class="message" id="message">Проверка обновлений...</div>
    <div class="countdown-wrap">
      <span class="countdown-num" id="countdown">8</span>
    </div>
    <div class="progress-wrap" style="display: none;">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-pct" id="progressPct" style="display: none;">0%</div>
  </div>
  <script>
    (function() {
      const api = window.splashAPI;
      if (!api) return;

      const root = document.getElementById('root');
      const message = document.getElementById('message');
      const countdownEl = document.getElementById('countdown');
      const progressBar = document.getElementById('progressBar');
      const progressPct = document.getElementById('progressPct');

      let countdown = 8;
      const countdownInterval = setInterval(function() {
        countdown--;
        countdownEl.textContent = countdown >= 0 ? countdown : 0;
        countdownEl.classList.add('pop');
        setTimeout(function() { countdownEl.classList.remove('pop'); }, 300);
        if (countdown <= 0) {
          clearInterval(countdownInterval);
          api.splashCountdownDone();
        }
      }, 1000);

      api.onUpdateStatus(function(status) {
        if (status === 'downloading') {
          root.classList.remove('state-checking');
          root.classList.add('state-downloading');
          message.textContent = 'Скачивание обновления...';
          progressBar.parentElement.style.display = 'block';
          progressPct.style.display = 'block';
          clearInterval(countdownInterval);
        }
      });

      api.onDownloadProgress(function(percent) {
        var p = Math.min(100, Math.max(0, percent));
        progressBar.style.width = p + '%';
        progressPct.textContent = Math.round(p) + '%';
      });

      api.onUpdateDownloaded(function() {
        root.classList.remove('state-downloading');
        root.classList.add('state-installing');
        message.textContent = 'Установка обновления...';
        progressBar.style.width = '0%';
        progressPct.textContent = '0%';

        var installPercent = 0;
        var installInterval = setInterval(function() {
          installPercent += 4;
          if (installPercent >= 100) {
            installPercent = 100;
            clearInterval(installInterval);
            progressBar.style.width = '100%';
            progressPct.textContent = '100%';
            if (api.notifyInstallDone) api.notifyInstallDone();
          } else {
            progressBar.style.width = installPercent + '%';
            progressPct.textContent = Math.round(installPercent) + '%';
          }
        }, 50);
      });
    })();
  </script>
</body>
</html>
